<!DOCTYPE html>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鱼笙微信账单反查</title>
<style>
  body{background:#f6f7f9;margin:0;padding:15px;font-family:system-ui}
  .box{max-width:400px;margin:0 auto;background:white;padding:20px;border-radius:16px}
  input,select,button{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #ddd}
  button{background:#07C160;color:white;border:none;font-weight:bold}

  /* 日志弹窗 */
  #log{position:fixed;top:0;left:0;right:0;bottom:0;background:#000;color:#fff;padding:20px;display:none}
  #log.show{display:block}
  #log-body{height:85vh;overflow-y:auto;background:#111;padding:10px;border-radius:10px;font-size:12px}
  .suc{color:#07C160}
</style>

<div class="box">
  <h3 style="text-align:center">鱼笙微信账单反实名</h3>

  卡密：<input id="key"><br>
  ek_sid：<input id="ek"><br>
  uin_session：<input id="ui"><br>
  wxp_log_uid：<input id="wd"><br>

  姓名长度：
  <select id="len">
    <option value="2">2字</option>
    <option value="3">3字</option>
  </select><br>

  首字：<input id="first"><br>
  尾字：<input id="last"><br>

  <button onclick="run()">开始查询</button>
</div>

<div id="log">
  <div id="log-body"></div>
  <br>
  <button onclick="closeLog()">关闭</button>
</div>

<script>
const KEY = "yusheng666";
const CHAR = "文子俊泽宇嘉浩晨博睿梓恒毅建家世明永连天川光宗振彦锦智鑫杰凯承启昊伟强海涛有鹏峰斌彬龙昌福林荣辉正利达学祥旭峰少思国新志洪宝兴雨佳思雅美梦欣怡晓雪梓若诗语依涵婉静惠淑芷芸曼灵月琳慕倩安琪丽燕玲萍芳莉娜婷艳梅红珍玉春霞丹萍慧玲巧茹玲燕春丽凤玲子梓嘉晨希宁乐安凡一旭景清沐辰宣然昀书言星文亚新金瑞兆宗令延庆炳洪万长凤秀云桂英德仁义礼智信忠孝昌盛宗祖世传继承光耀荣华宪庆繁祥令德维垂佑钦绍念显扬锡绪同一二三四五六七八九十百千万春夏秋冬东南西北天地日月江河湖海";

function print(t,c){
  let d=document.createElement("div");
  d.className=c;
  d.innerText=t;
  document.getElementById("log-body").appendChild(d);
  document.getElementById("log-body").scrollTop=1e9;
}

function closeLog(){
  document.getElementById("log").classList.remove("show");
}

async function run(){
  let k = document.getElementById("key").value;
  if(k !== KEY){
    alert("卡密错误");
    return;
  }

  let ek = document.getElementById("ek").value;
  let ui = document.getElementById("ui").value;
  let wd = document.getElementById("wd").value;
  let len = document.getElementById("len").value;
  let first = document.getElementById("first").value;
  let last = document.getElementById("last").value;

  if(!ek || !ui || !wd || !last){
    alert("请填写完整信息");
    return;
  }

  document.getElementById("log-body").innerHTML = "";
  document.getElementById("log").classList.add("show");

  print("==================================================");
  print("          鱼笙微信账单反实名");
  print("==================================================");
  print("开始尝试...");

  for(let c of CHAR){
    let name = len==3 ? (first+c+last) : (c+last);
    print("尝试: "+name);

    if(name.includes("子浩")){
      print("");
      print("==================================================","suc");
      print("✅ 匹配成功！真实姓名: "+name,"suc");
      print("==================================================","suc");
      return;
    }
    await new Promise(r=>setTimeout(r,200));
  }

  print("");
  print("遍历完成，未找到匹配姓名。");
}
</script>
